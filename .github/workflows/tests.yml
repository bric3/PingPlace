name: Tests

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  tests:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run test suite
        run: make test
